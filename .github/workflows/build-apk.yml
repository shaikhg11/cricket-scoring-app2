name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:          # allows manual trigger from GitHub UI

# Opt into Node.js 24 for all actions (avoids Node 20 deprecation warnings)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Node ────────────────────────────────────────────────
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # ── 3. Java (required by Gradle) ───────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # ── 4. Install JS deps ─────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 5. Build web app ───────────────────────────────────────
      - name: Build web app (Vite)
        run: npm run build

      # ── 6. Bootstrap Android platform ─────────────────────────
      - name: Add Android platform
        run: npx cap add android

      - name: Sync web build into Android
        run: npx cap sync android

      # ── 7. Gradle build ────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      # ── 8. Upload artifact ─────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cricket-scorer-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/cricket-score-by-aus.apk
          retention-days: 30

      # ── 9. Print download hint ─────────────────────────────────
      - name: APK ready
        run: |
          echo "✅ APK built successfully!"
          echo "Download from: Actions → this run → Artifacts → cricket-scorer-debug-${{ github.run_number }}"
